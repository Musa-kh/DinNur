<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="styles/basicST.css">
    <link rel="stylesheet" href="styles/headerST.css">
    <title>DinNur</title>
</head>
<body>
    <header>
        <div class="head">
            <div class="logo">
                <img width="80" height="60" src="assets/LogoDin.webp" alt="DinNur">
            </div>
            <nav class="navigation num1">
                <a class="home" href="#" data-key="home">Главная</a>
                <a class="acquaintance" href="#" data-key="acquaintance">Знакомство</a>
                <a class="products" href="#" data-key="products">Парфюмы</a>
                <a class="order" href="#" data-key="order">Заказать</a>
                <a class="contact" href="#contact" data-key="contact">Контакты</a>
            </nav>
            <div class="lang-dropdown-container num1">
                <button type="button" class="lang-dropdown-toggle" aria-label="Выбрать язык">
                    <span class="current-lang">RU</span>
                    <span class="arrow-icon"></span>
                </button>
                <div class="lang-dropdown-menu">
                    <button type="button" class="lang-option" data-lang="ru">Русский</button>
                    <button type="button" class="lang-option" data-lang="kz">Қазақша</button>
                    <button type="button" class="lang-option" data-lang="en">English</button>
                </div>
            </div>
            <div class="menuBTN">
                <img id="openMenu" width="30" height="20" src="assets/menuIMG.webp" alt="Menu">
            </div>
        </div>

        <div id="mobileMenu" class="mobileMenu">
            <div class="mobileMenuTop">
                <img id="closeMenu" width="30" height="30" src="assets/closeIcon.svg" alt="Close menu">
            </div>
            <nav class="navigation num2">
                <a class="home" href="#" data-key="home">Главная</a>
                <a class="acquaintance" href="#" data-key="acquaintance">Знакомство</a>
                <a class="products" href="#" data-key="products">Парфюмы</a>
                <a class="order" href="#" data-key="order">Заказать</a>
                <a class="contact" href="#contact" data-key="contact">Контакты</a>
            </nav>
        </div>

        <div class="headgrid">
            <p class="eyebrowHead">European fragrance house</p>
            <h1 class="titleHead">Essens</h1>
            <p class="paragHead">Европейская компания <br>
                Просто прикоснись, просто попробуй
            </p>
            <a class="heroAction" href="#" data-key="order">Заказать</a>
            <div class="imageHeader">
                <img src="assets/backroundHead.svg" alt="">
            </div>
        </div>
    </header>
    <main></main>
    <footer id="contact">


    </footer>
    <script src="scripts/scrolLang.js"></script>
    <script src="scripts/mobileLang.js"></script>
    <script src="scripts/mobileNavigation.js"></script>
    <script src="scripts/changeLang.js"></script>
</body>
</html>
